<!-- FlashFlood 闪电水灾 — WeatherNext family — next 48h flash-flood risk + last 24h actual rain · Open-Meteo -->
<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FlashFlood Lab · 闪电水灾</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FlashFlood">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="FlashFlood">
<meta name="theme-color" content="#0ea5e9">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="Next-48h flash-flood risk for Malaysian farms and towns. 未来48小时骤洪风险预警。">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<style>
  :root{
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
    --sky:#0ea5e9; --sky-deep:#0369a1; --ink:#0c4a6e;
    --green:#059669; --amber:#d97706; --orange:#ea580c; --red:#dc2626;
    --slate-900:#0f172a; --slate-700:#334155; --slate-600:#475569;
    --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1;
    --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{line-height:1.5;-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--slate-100); color:#000; margin:0; padding:0;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    user-select:none; -webkit-user-select:none;
    padding-bottom:calc(48px + var(--safe-bottom));
  }
  .tabular{font-variant-numeric:tabular-nums}
  header{
    background:#fff; border-bottom:2px solid var(--slate-100);
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:0 14px; padding-top:var(--safe-top);
    height:calc(76px + var(--safe-top));
    position:sticky; top:0; z-index:50;
  }
  .h-left{display:flex; align-items:center; gap:9px; min-width:0; flex:1 1 auto}
  .h-title{min-width:0; overflow:hidden}
  .icon-tile{
    width:34px; height:34px; background:var(--sky); border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    flex:none; font-size:19px;
  }
  .h-title h1{
    font-size:20px; font-weight:900; letter-spacing:-.03em; line-height:1;
    color:var(--slate-900); margin:0; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .h-title .sub{
    font-size:11px; font-weight:700; color:var(--slate-400);
    margin-top:5px; text-transform:uppercase; letter-spacing:.02em;
  }
  .h-actions{display:flex; align-items:center; gap:3px; flex:none}
  .add-btn,.info-btn{
    display:flex; align-items:center; justify-content:center; height:38px;
    background:none; color:var(--sky); border:none; cursor:pointer;
    transition:transform .15s; flex:none;
  }
  .add-btn{width:38px}
  .info-btn{width:34px}
  .add-btn:active,.info-btn:active{transform:scale(.9)}
  body.drive-dark{background:#000}
  body.drive-dark header{background:#000; border-color:#1a1a1a; z-index:70}
  body.drive-dark header *{color:#c7ccd1 !important; fill:#c7ccd1}
  body.drive-dark #driveBtn.driving svg{color:#c7ccd1}
  body.drive-dark #driveBtn.driving[data-prog]::after{display:none}
  body.drive-dark main{visibility:hidden}
  body.drive-dark *{transition:none !important}
  #driveOverlay{position:fixed; inset:0; top:0; z-index:60; display:none;
    background:#000; flex-direction:column; align-items:center; justify-content:center;
    gap:14px; padding:24px; text-align:center;
    padding-top:calc(var(--safe-top) + 72px)}
  body.drive-dark #driveOverlay{display:flex}
  #driveOverlay .do-count{font-size:64px; font-weight:900; letter-spacing:-1px;
    color:#e8eaed; font-variant-numeric:tabular-nums; line-height:1}
  #driveOverlay .do-label{font-size:15px; font-weight:700; color:#7a828c; letter-spacing:.3px}
  #driveOverlay .do-name{font-size:13px; color:#5a616b; max-width:80%;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  #driveOverlay .do-dot{width:9px; height:9px; border-radius:50%; background:var(--sky);
    animation:drivePulse 1.4s ease-in-out infinite}
  #driveBtn{position:relative}
  #driveBtn.driving svg{animation:drivePulse 1.4s ease-in-out infinite}
  @keyframes drivePulse{0%,100%{opacity:1}50%{opacity:.4}}
  #driveBtn.driving[data-prog]::after{content:attr(data-prog);position:absolute;
    top:-7px;left:50%;transform:translateX(-30%);background:var(--sky);color:#fff;
    font-size:9px;font-weight:800;line-height:1;padding:2px 5px;border-radius:9999px;
    white-space:nowrap;animation:none;opacity:1;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .lang-btn{
    background:none; color:var(--sky); border:none; border-radius:9999px;
    height:38px; padding:0 6px; font-size:14px; font-weight:900;
    cursor:pointer; flex:none; transition:transform .15s;
  }
  .lang-btn:active{transform:scale(.9)}
  main{max-width:760px; margin:0 auto; padding:14px}
  .attrib{display:flex; justify-content:center; margin-top:18px; padding-bottom:calc(10px + var(--safe-bottom))}
  .attrib a{font-size:11px; font-weight:600; color:var(--slate-400); text-decoration:none;
    letter-spacing:.01em; padding:4px 10px; border-radius:9999px; border:1px solid var(--slate-200); background:var(--slate-100)}
  .attrib a:hover{color:var(--sky); border-color:#bae6fd}
  .loc-list{display:flex; flex-direction:column; gap:12px}
  .export-all-btn{display:flex; align-items:center; justify-content:center; gap:7px;
    width:100%; box-sizing:border-box; background:var(--slate-100); color:var(--slate-700);
    border:1px solid var(--slate-200); border-radius:10px; padding:10px 13px; margin-bottom:12px;
    font-size:14px; font-weight:600; font-family:inherit; cursor:pointer}
  .export-all-btn:active{transform:scale(.99); background:var(--slate-200)}
  .loc-filter{width:100%; box-sizing:border-box; background:#fff; border:1px solid var(--slate-300);
    color:var(--slate-900); border-radius:10px; padding:10px 13px; font-size:15px;
    font-family:inherit; margin-bottom:12px}
  .loc-filter:focus{outline:2px solid var(--sky); outline-offset:0; border-color:var(--sky)}
  .loc-group-h{display:flex; align-items:center; gap:9px; cursor:pointer; user-select:none;
    background:var(--slate-100); border:1px solid var(--slate-200); border-radius:11px;
    padding:13px 15px; flex-wrap:wrap}
  .loc-group-h:active{transform:scale(.995)}
  .lg-caret{color:var(--slate-500); font-size:12px; width:12px; flex-shrink:0}
  .lg-name{font-size:15px; font-weight:700; color:var(--slate-900); flex-shrink:0}
  .loc-group-h.open .lg-name{color:var(--sky-deep)}
  .lg-count{font-size:12px; font-weight:700; color:var(--slate-600); background:#fff;
    border:1px solid var(--slate-200); border-radius:9999px; padding:1px 10px; min-width:22px;
    text-align:center; margin-left:auto; flex-shrink:0}
  /* region-worst risk dot on the accordion header */
  .lg-worst{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-left:2px}
  /* region risk-word badge (teacher mode) — readable without relying on colour */
  .lg-badge{flex:none; margin-left:4px; font-size:11px; font-weight:900; letter-spacing:.01em;
    padding:2px 9px; border-radius:999px; border:1.5px solid; white-space:nowrap}
  .lg-badge.lg-safe{color:#047857; background:#ecfdf5; border-color:#6ee7b7}
  .lg-badge.lg-waspada{color:#b45309; background:#fffbeb; border-color:#fcd34d}
  .lg-badge.lg-buruk{color:#c2410c; background:#fff7ed; border-color:#fdba74}
  .lg-badge.lg-bahaya{color:#fff; background:#dc2626; border-color:#dc2626}
  /* pin stars */
  .lg-pin,.loc-pin{flex:none; background:none; border:none; cursor:pointer; padding:2px 4px;
    font-size:17px; line-height:1; color:#cbd5e1; -webkit-tap-highlight-color:transparent}
  .lg-pin{margin-left:2px}
  .lg-pin.on,.loc-pin.on{color:#f59e0b}
  .loc-pin{margin-left:auto; font-size:19px; align-self:flex-start}
  .loc-group-h.pinned{background:linear-gradient(90deg,rgba(245,158,11,.08),transparent)}
  .loc-group-h.pinned .lg-name::before{content:"★ "; color:#f59e0b; font-size:12px}
  /* mode toggle button — icon, compact, language-independent */
  .mode-btn{flex:none; width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    background:none; border:none; cursor:pointer; padding:0; border-radius:10px;
    -webkit-tap-highlight-color:transparent}
  .mode-btn svg{width:24px; height:24px}
  .mode-btn.teacher{color:#0284c7}
  .mode-btn.relief{color:#0284c7}
  .mode-btn:active{transform:scale(.9)}
  .loc-group-body{display:flex; flex-direction:column; gap:12px; margin:12px 0 4px 6px;
    padding-left:10px; border-left:2px solid var(--slate-200)}
  .lg-refresh{background:#fff; border:1px solid var(--slate-300); color:var(--sky-deep);
    font-size:14px; font-weight:700; min-width:30px; height:26px; padding:0 8px;
    border-radius:9999px; cursor:pointer; margin-left:auto; line-height:1}
  .lg-refresh:active{transform:scale(.94)}
  .loc-group-h .lg-count{margin-left:8px}
  .toast{position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px);
    background:var(--slate-900); color:#fff; padding:11px 18px; border-radius:10px;
    font-size:14px; font-weight:600; opacity:0; pointer-events:none; transition:.25s; z-index:90;
    box-shadow:0 8px 24px rgba(0,0,0,.25); max-width:80vw; text-align:center}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}

  .card-wrap{position:relative; width:100%; border-radius:16px; overflow:hidden; background:#fff;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1); isolation:isolate}
  .swipe-actions{display:flex; width:100%; overflow:hidden; max-height:0; opacity:0;
    transition:max-height .24s cubic-bezier(.2,.8,.2,1), opacity .18s; border-top:0 solid var(--slate-100)}
  .card-wrap.actions-open .swipe-actions{max-height:64px; opacity:1; border-top-width:1px}
  .action-btn{flex:1; display:flex; align-items:center; justify-content:center; border:none; cursor:pointer; color:#fff; height:60px}
  .action-btn:active{filter:brightness(.92)}
  .btn-share{background:#10b981}
  .btn-edit{background:#3b82f6}
  .btn-delete{background:#ef4444}
  .card{position:relative; z-index:10; background:#fff; width:100%}
  .action-btn svg{width:26px; height:26px}
  @media(min-width:760px){
    .swipe-actions{position:absolute; top:0; bottom:0; right:0; width:168px; max-height:none; opacity:1;
      z-index:20; border-top:0; transform:translateX(100%); transition:transform .2s cubic-bezier(.2,.8,.2,1)}
    .card-wrap.actions-open .swipe-actions{transform:translateX(0); max-height:none}
    .action-btn{height:auto}
    .card-wrap.actions-open .card-head,.card-wrap.actions-open .card-body{
      padding-right:180px; transition:padding-right .2s cubic-bezier(.2,.8,.2,1)}
  }
  .card-head{display:flex; align-items:center; gap:12px; padding:14px 16px 10px}
  .pin{width:38px; height:38px; border-radius:11px; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:19px;
    box-shadow:0 1px 2px 0 rgba(0,0,0,.05)}
  .card-name-wrap{flex:1; min-width:0}
  .card-name{font-size:18px; font-weight:900; letter-spacing:-.02em; color:var(--slate-900);
    line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .card-coords{font-size:12px; font-weight:700; color:var(--slate-400); margin-top:2px}
  .grip{color:var(--slate-300); flex:none; display:flex; align-items:center; justify-content:center;
    width:36px; height:36px; margin:-6px -8px -6px 0; padding:0; border:none; background:none;
    cursor:pointer; border-radius:9px; transition:color .15s, background .15s}
  .grip:hover{color:var(--slate-500); background:var(--slate-100)}
  .grip:active{transform:scale(.9)}
  .bin-entry{display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    margin-top:14px; padding:11px; border:none; background:none; cursor:pointer;
    color:var(--slate-500); font-size:13px; font-weight:800; transition:color .15s}
  .bin-entry:hover{color:var(--slate-700)}
  .bin-entry-count{min-width:18px; height:18px; padding:0 5px; background:#ef4444; color:#fff;
    font-size:10px; font-weight:900; border-radius:9999px; display:flex; align-items:center; justify-content:center}
  .bin-entry-count.hidden{display:none}
  .bin-back{display:flex; align-items:center; gap:7px; margin-bottom:14px; padding:6px 0;
    border:none; background:none; cursor:pointer; color:var(--sky-deep); font-size:14px; font-weight:800}
  .bin-back:active{opacity:.6}
  .bin-row{display:flex; align-items:center; gap:10px; background:var(--slate-50);
    border:1px solid var(--slate-100); border-radius:12px; padding:11px 12px; margin-bottom:8px}
  .bin-info{flex:1; min-width:0}
  .bin-name{font-size:15px; font-weight:900; color:var(--slate-700); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bin-coords{font-size:11px; font-weight:700; color:var(--slate-400); margin-top:1px}
  .bin-btn{border:none; border-radius:9px; padding:9px 12px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; flex:none; transition:transform .15s}
  .bin-btn:active{transform:scale(.92)}
  .bin-restore{background:#e0f2fe; color:var(--sky-deep)}
  .bin-purge{background:#fee2e2; color:#dc2626}
  .card-body{padding:0 16px 14px}

  /* ==== RISK HERO ==== */
  .risk-hero{border-radius:14px; padding:14px 15px; margin-bottom:12px; position:relative; overflow:hidden}
  .risk-hero.safe{background:linear-gradient(135deg,#ecfdf5,#d1fae5); border:1px solid #6ee7b7}
  .risk-hero.waspada{background:linear-gradient(135deg,#fffbeb,#fef3c7); border:1px solid #fcd34d}
  .risk-hero.buruk{background:linear-gradient(135deg,#fff7ed,#ffedd5); border:1px solid #fdba74}
  .risk-hero.bahaya{background:linear-gradient(135deg,#fef2f2,#fee2e2); border:1px solid #fca5a5}
  .risk-top{display:flex; align-items:center; gap:12px}
  .risk-badge{font-size:30px; line-height:1; flex:none}
  .risk-tier-wrap{flex:1; min-width:0}
  .risk-tier{font-size:19px; font-weight:900; letter-spacing:-.02em; line-height:1.1}
  .risk-hero.safe .risk-tier{color:#047857}
  .risk-hero.waspada .risk-tier{color:#b45309}
  .risk-hero.buruk .risk-tier{color:#c2410c}
  .risk-hero.bahaya .risk-tier{color:#b91c1c}
  .risk-window{font-size:12px; font-weight:800; margin-top:3px; color:var(--slate-600)}
  .risk-score{font-size:34px; font-weight:900; letter-spacing:-.03em; line-height:1; flex:none; font-variant-numeric:tabular-nums}
  .risk-hero.safe .risk-score{color:#059669}
  .risk-hero.waspada .risk-score{color:#d97706}
  .risk-hero.buruk .risk-score{color:#ea580c}
  .risk-hero.bahaya .risk-score{color:#dc2626}
  .risk-advice{font-size:13px; font-weight:700; line-height:1.4; margin-top:10px; color:var(--slate-700)}
  .risk-hero.bahaya .risk-advice{color:#991b1b}

  /* metric mini-tiles under the hero */
  .metric-row{display:flex; gap:10px; margin-bottom:12px}
  .metric{flex:1; min-width:0; border-radius:12px; padding:10px 12px; background:var(--slate-50); border:1px solid var(--slate-100)}
  .metric .ml{font-size:11px; font-weight:900; color:var(--slate-500); text-transform:uppercase; letter-spacing:.02em; line-height:1.2}
  .metric .mn{font-size:22px; font-weight:900; letter-spacing:-.02em; color:var(--slate-800); margin-top:4px; line-height:1}
  .metric .mu{font-size:12px; font-weight:800; opacity:.75; margin-left:1px}
  .metric.soil .mn{color:var(--sky-deep)}
  .metric.soil.wet .mn{color:#c2410c}

  /* 48h hourly forecast strip */
  .fc-wrap{background:var(--slate-50); border:1px solid var(--slate-100); border-radius:12px; padding:10px 12px 8px; margin-bottom:12px}
  .fc-cap{font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; color:var(--slate-600); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center}
  .fc-cap .fx{font-weight:800; color:var(--slate-600); text-transform:none; letter-spacing:0}
  .fc-bars{display:flex; align-items:flex-end; gap:2px; height:52px}
  .fc-col{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%; position:relative}
  .fc-bar{width:100%; min-height:2px; border-radius:2px 2px 0 0}
  .fc-bar.past{opacity:.45}
  .fc-axis{display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:var(--slate-400); margin-top:5px}
  .fc-nowline{font-size:9px;font-weight:800;color:var(--sky-deep)}
  /* recession / "is it easing" panel */
  .rec-wrap{border-radius:12px; padding:11px 13px; margin-bottom:12px; border:1px solid}
  .rec-wrap.raining{background:#fef2f2; border-color:#fca5a5}
  .rec-wrap.watch{background:#fffbeb; border-color:#fcd34d}
  .rec-wrap.easing{background:#ecfdf5; border-color:#6ee7b7}
  .rec-top{display:flex; align-items:center; gap:8px}
  .rec-emoji{font-size:16px; flex:none}
  .rec-head{font-size:14px; font-weight:900; letter-spacing:-.01em}
  .rec-wrap.raining .rec-head{color:#b91c1c}
  .rec-wrap.watch .rec-head{color:#b45309}
  .rec-wrap.easing .rec-head{color:#047857}
  .rec-detail{font-size:13px; font-weight:600; color:var(--slate-700); line-height:1.45; margin-top:6px}
  .rec-warn{font-size:12px; font-weight:700; color:var(--slate-600); line-height:1.45; margin-top:8px;
    padding-top:8px; border-top:1px dashed var(--slate-200)}
  .rec-link{display:inline-block; margin-top:9px; font-size:12px; font-weight:800; color:var(--sky-deep);
    text-decoration:none; padding:7px 12px; background:#fff; border:1px solid var(--slate-200); border-radius:9px}
  .rec-link:active{transform:scale(.97)}

  .btn-row{display:flex; gap:8px}
  .act{flex:1; border:none; border-radius:10px; padding:12px 8px; font-size:12px; font-weight:900;
    text-transform:uppercase; letter-spacing:.04em; color:#fff; cursor:pointer; display:flex;
    align-items:center; justify-content:center; gap:6px;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1); transition:transform .15s; line-height:1.2}
  .act:active{transform:scale(.95)}
  .act:disabled{opacity:.45; box-shadow:none; transform:none; cursor:default}
  .act-get{background:linear-gradient(135deg,#0ea5e9 0%,#0369a1 100%)}
  .act-xls{background:linear-gradient(135deg,#059669 0%,#047857 100%)}
  .card-status{font-size:12px; font-weight:700; text-align:center; margin-top:9px; min-height:1em; color:var(--slate-400)}
  .empty{text-align:center; padding:56px 24px; color:var(--slate-400)}
  .empty .big{font-size:52px; margin-bottom:12px}
  .empty .t{font-size:17px; font-weight:900; color:var(--slate-600)}
  .empty .d{font-size:13px; font-weight:600; margin-top:6px}
  .guide-overlay{position:fixed; left:0; right:0; bottom:0; top:calc(76px + var(--safe-top)); z-index:45;
    background:var(--slate-50); display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1); visibility:hidden}
  .guide-overlay.on{transform:translateY(0); visibility:visible}
  .guide-top{flex:none; display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 14px; background:#fff; border-bottom:1px solid var(--slate-200)}
  .guide-top-title{font-size:19px; font-weight:900; color:var(--slate-900); letter-spacing:-.02em}
  .guide-close{width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border:none; background:var(--slate-100); border-radius:9999px; color:var(--slate-600); cursor:pointer; flex:none; transition:transform .15s}
  .guide-close:active{transform:scale(.9)}
  .guide-body{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:18px 18px calc(40px + var(--safe-bottom)); max-width:680px; width:100%; margin:0 auto}
  .g-sec{margin-bottom:22px}
  .g-h{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .g-ico{width:30px; height:30px; flex:none; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px}
  .g-h h3{font-size:16px; font-weight:900; color:var(--slate-900); letter-spacing:-.01em}
  .g-sec p{font-size:14px; font-weight:500; color:var(--slate-600); line-height:1.6; margin-left:40px}
  .g-sec p b{font-weight:900; color:var(--slate-800)}
  .g-intro{font-size:14px; font-weight:600; color:var(--slate-600); line-height:1.6; margin-bottom:24px;
    background:#fff; border:1px solid var(--slate-200); border-radius:12px; padding:14px 16px}
  .g-foot{font-size:12px; font-weight:600; color:var(--slate-400); line-height:1.6; text-align:center;
    margin-top:8px; padding-top:18px; border-top:1px solid var(--slate-200)}
  .g-tiers{display:flex;flex-direction:column;gap:7px;margin:10px 0 4px 40px}
  .g-tier{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--slate-600)}
  .g-tier .gt-dot{width:14px;height:14px;border-radius:50%;flex:none}
  /* QR share card */
  .qr-card{display:flex; align-items:center; gap:16px; background:#fff; border:1px solid var(--slate-200);
    border-radius:14px; padding:16px; margin-bottom:22px}
  .qr-svg{width:104px; height:104px; flex:none; border-radius:8px; overflow:hidden; background:#fff}
  .qr-svg svg{width:100%; height:100%; display:block}
  .qr-text{min-width:0; flex:1}
  .qr-title{font-size:15px; font-weight:900; color:var(--slate-900); letter-spacing:-.01em}
  .qr-sub{font-size:13px; font-weight:600; color:var(--slate-600); line-height:1.45; margin-top:4px}
  .qr-link{display:inline-block; margin-top:9px; font-size:12px; font-weight:800; color:var(--sky-deep);
    text-decoration:none; word-break:break-all}
  .qr-link:active{opacity:.7}
  @media(max-width:430px){
    .qr-card{gap:13px; padding:14px}
    .qr-svg{width:86px; height:86px}
  }
  /* phase-based safety SOP */
  .sop-intro{margin-left:40px !important; margin-bottom:14px}
  .sop-phase{margin:0 0 12px 40px; border-radius:12px; padding:12px 14px; border:1px solid}
  .sop-phase.before{background:#eff6ff; border-color:#bfdbfe}
  .sop-phase.during{background:#fef2f2; border-color:#fecaca}
  .sop-phase.pps{background:#fffbeb; border-color:#fde68a}
  .sop-phase.return{background:#f0fdf4; border-color:#bbf7d0}
  .sop-phase.rebuild{background:#f5f3ff; border-color:#ddd6fe}
  .sop-ph-head{display:flex; align-items:center; gap:9px; margin-bottom:7px}
  .sop-ph-emoji{font-size:18px; flex:none}
  .sop-ph-title{font-size:15px; font-weight:900; color:var(--slate-900); letter-spacing:-.01em}
  .sop-steps{margin:0; padding-left:20px; display:flex; flex-direction:column; gap:5px}
  .sop-steps li{font-size:13px; font-weight:500; color:var(--slate-700); line-height:1.5}
  .sop-steps li b{font-weight:900; color:var(--slate-900)}
  .sop-contacts-box{margin:6px 0 4px 40px; background:var(--slate-900); border-radius:12px; padding:14px 16px}
  .sop-contacts-title{font-size:13px; font-weight:900; color:#fff; margin-bottom:10px; letter-spacing:.01em}
  .sop-contact{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:7px 0; border-top:1px solid rgba(255,255,255,.12)}
  .sop-contact:first-of-type{border-top:none}
  .sop-c-label{font-size:12px; font-weight:700; color:#cbd5e1; flex:1; min-width:0}
  .sop-c-val{font-size:14px; font-weight:900; color:#7dd3fc; text-decoration:none; flex:none; text-align:right}
  .sop-c-val:active{opacity:.7}
  .overlay{position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:1000; display:none; align-items:flex-end; justify-content:center}
  .overlay.on{display:flex}
  .sheet{background:#fff; width:100%; max-width:760px; border-radius:22px 22px 0 0; padding:22px 18px;
    padding-bottom:calc(26px + var(--safe-bottom)); max-height:92vh; overflow:auto; position:relative}
  .sheet h2{font-size:19px; font-weight:900; color:var(--slate-900); margin:0 0 4px; letter-spacing:-.02em}
  .sheet .sd{font-size:13px; font-weight:600; color:var(--slate-500); margin-bottom:16px}
  .x-btn{position:absolute; top:16px; right:16px; background:none; border:none; color:var(--slate-300); cursor:pointer; padding:6px; line-height:1}
  label{display:block; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.06em; color:var(--slate-500); margin:14px 0 6px}
  input{width:100%; border:1.5px solid var(--slate-200); border-radius:11px; padding:13px; font-size:17px; font-weight:600; background:#fff; color:var(--slate-900); font-family:inherit}
  input::placeholder{font-weight:400; color:var(--slate-400)}
  input:focus{outline:none; border-color:var(--sky); box-shadow:0 0 0 3px rgba(14,165,233,.12)}
  .coord-pair{display:flex; gap:10px}
  .coord-pair>div{flex:1}
  .gps-btn{width:100%; margin-top:12px; background:#e0f2fe; color:var(--sky-deep); border:1.5px solid #bae6fd; border-radius:11px; padding:13px;
    font-size:14px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:.03em; display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .15s}
  .gps-btn:active{transform:scale(.97)}
  .gps-status{font-size:12px; font-weight:700; text-align:center; margin-top:8px; min-height:1em; color:var(--slate-400)}
  .share-textarea{width:100%; box-sizing:border-box; border:1.5px solid var(--slate-200); border-radius:11px;
    padding:13px; font-size:15px; font-weight:500; line-height:1.5; background:#fff; color:var(--slate-900);
    font-family:inherit; resize:vertical; min-height:150px; white-space:pre-wrap}
  .share-textarea:focus{outline:none; border-color:var(--sky); box-shadow:0 0 0 3px rgba(14,165,233,.12)}
  .share-tip{font-size:12px; font-weight:600; color:var(--slate-500); margin-top:10px; line-height:1.5;
    background:var(--slate-50); border:1px solid var(--slate-100); border-radius:10px; padding:9px 11px}
  .share-preview-thumb{margin-bottom:14px; text-align:center}
  .share-preview-thumb img{max-width:100%; max-height:200px; border-radius:12px;
    border:1px solid var(--slate-200); box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .sheet-actions{display:flex; gap:10px; margin-top:22px}
  .s-act{flex:1; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:900; cursor:pointer; transition:transform .15s; letter-spacing:.02em}
  .s-act:active{transform:scale(.96)}
  .s-cancel{background:var(--slate-100); color:var(--slate-600)}
  .s-save{background:linear-gradient(135deg,#0ea5e9 0%,#0369a1 100%); color:#fff; box-shadow:0 4px 6px -1px rgba(3,105,161,.25)}
  .spin{display:inline-block; width:14px; height:14px; border:2.5px solid rgba(255,255,255,.45); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @media(min-width:760px){.overlay{align-items:center}.sheet{border-radius:22px; max-height:86vh}}
  @media(max-width:430px){
    .metric{padding:10px 11px}
    .metric .mn{font-size:20px}
    .risk-score{font-size:30px}
    .risk-tier{font-size:17px}
  }
  @media(max-width:430px){
    .h-title h1{font-size:18px}
    .info-btn,.mode-btn{width:32px}
    .add-btn{width:32px}
    .h-actions{gap:1px}
  }
  @media(max-width:360px){.h-title h1{font-size:16px}.risk-score{font-size:27px}}
</style>
</head>

<script>
const NS="flashflood_lab";
const KEY=NS+".locations";
const CACHEKEY=NS+".cache";
const BINKEY=NS+".bin";
const LANGKEY=NS+".lang";
const MODEKEY=NS+".mode";
const PINREGKEY=NS+".pinnedRegions";
const PINLOCKEY=NS+".pinnedLocs";
let lang=localStorage.getItem(LANGKEY)||"ms";
/* Audience mode: "teacher" (one-district focus, pins float to top, clear risk words)
   or "relief" (see all districts at once — the original behaviour). Default teacher,
   since a district teacher-counsellor is the more common single-user. */
let appMode=localStorage.getItem(MODEKEY)||"teacher";
/* Pins: regions ("my district") and individual locations ("my schools/villages").
   Stored as arrays in localStorage, held as Sets at runtime. */
let pinnedRegions=new Set(JSON.parse(localStorage.getItem(PINREGKEY)||"[]"));
let pinnedLocs=new Set(JSON.parse(localStorage.getItem(PINLOCKEY)||"[]"));
function savePins(){
  localStorage.setItem(PINREGKEY,JSON.stringify([...pinnedRegions]));
  localStorage.setItem(PINLOCKEY,JSON.stringify([...pinnedLocs]));
}
function toggleRegionPin(region){
  if(pinnedRegions.has(region)) pinnedRegions.delete(region); else pinnedRegions.add(region);
  savePins(); render();
}
function toggleLocPin(id){
  if(pinnedLocs.has(id)) pinnedLocs.delete(id); else pinnedLocs.add(id);
  savePins(); render();
}
function renderModeBtn(){
  const b=document.getElementById("modeBtn"); if(!b) return;
  // teacher = graduation cap; relief = life-ring. Icon shows the CURRENT mode.

/* ===== Flash-flood risk model =====
   Grounded in Malaysian operational thresholds:
   - MetMalaysia issues thunderstorm warnings at rainfall intensity >20mm/h.
   - JPS/InfoBanjir Selangor: convective rain ~60mm within 2-4h can trigger flash floods.
   - Antecedent soil saturation is the biggest amplifier: the same storm floods
     saturated ground but drains off dry ground.
   Sub-scores 0..1, combined & multiplied by a saturation factor -> 0..100 -> tier. */
function sIntensity(peak1h){          // peak 1-hour rainfall (mm)
  if(peak1h==null) return 0;
  if(peak1h<=5) return 0;
  if(peak1h>=50) return 1;
  if(peak1h<=20) return (peak1h-5)/15*0.55;      // 20mm/h (MetMalaysia line) -> 0.55
  return 0.55 + (peak1h-20)/30*0.45;
}
function sAccum3h(max3h){              // worst rolling 3-hour accumulation (mm)
  if(max3h==null) return 0;
  if(max3h<=15) return 0;
  if(max3h>=100) return 1;
  if(max3h<=60) return (max3h-15)/45*0.7;        // 60mm/3h (JPS trigger) -> 0.70
  return 0.7 + (max3h-60)/40*0.3;
}
function satMult(sm0, rain24){        // saturation multiplier 0.6..1.35
  let s=0.6;
  if(sm0!=null) s=0.6 + Math.min(1,Math.max(0,(sm0-0.15)/0.30))*0.6;
  if(rain24>=50) s+=0.15; else if(rain24>=20) s+=0.08;
  return Math.min(1.35, s);
}
/* Compute the whole risk picture from an hourly forecast series + antecedent state.
   `hours` = [{t, mm, prob, cape}], from NOW forward (already sliced to next 48h).
   Returns {score, tier, peak1h, peak1hAt, max3h, max3hAt, sm0, rain24, windowLabel}. */
/* ===== Recession / "is it easing?" signal =====
   IMPORTANT: this is NOT an all-clear. The app only knows forecast rainfall — it has
   NO water-level, river-gauge or on-the-ground data, and flood water can remain for
   hours-to-days after rain stops. This computes a *supporting* signal only: how long
   since meaningful rain fell, and whether the next 24h is dry. It always directs the
   user to the authoritative ground-truth (DID PublicInfoBanjir + NADMA/999).
   Returns null unless there was a real recent downpour (so it never nags on dry days). */
const REC_WET_MM=2, REC_HEAVY_MM=10;
function recessionInfo(series){
  if(!series||!series.length) return null;
  const now=Date.now();
  const past=series.filter(h=>h.past && h.mm!=null);
  const future=series.filter(h=>!h.past && h.mm!=null);
  if(!past.length) return null;
  const recentPeak24=Math.max(0,...past.map(h=>h.mm));
  if(recentPeak24<REC_HEAVY_MM) return null;   // no flood-scale rain recently -> nothing to say
  let hoursSinceRain=null;
  for(let i=past.length-1;i>=0;i--){
    if(past[i].mm>=REC_WET_MM){ hoursSinceRain=Math.max(0,Math.round((now-new Date(past[i].t).getTime())/3600000)); break; }
  }
  if(hoursSinceRain===null) hoursSinceRain=24;
  const next24=future.slice(0,24);
  const next24Peak=next24.length?Math.max(0,...next24.map(h=>h.mm)):0;
  const next24Dry=next24Peak<REC_WET_MM;
  // three states:
  //  raining   – rain still falling now (<=1h since) OR heavy rain in next few hours
  //  watch     – rain paused but more is forecast in next 24h (do NOT assume receding)
  //  easing    – no rain for a while AND next 24h dry (conditions may be easing)
  let state;
  const soonPeak=future.slice(0,6).reduce((m,h)=>Math.max(m,h.mm||0),0);
  if(hoursSinceRain<=1 || soonPeak>=REC_HEAVY_MM) state="raining";
  else if(!next24Dry) state="watch";
  else state="easing";
  return {recentPeak24:Math.round(recentPeak24*10)/10, hoursSinceRain, next24Dry, next24Peak:Math.round(next24Peak*10)/10, state};
}
function computeRisk(hours, sm0, rain24){
  if(!hours || !hours.length) return null;
  // peak single-hour intensity
  let peak1h=0, peak1hIdx=-1;
  hours.forEach((h,i)=>{ if(h.mm!=null && h.mm>peak1h){peak1h=h.mm; peak1hIdx=i;} });
  // worst rolling 3-hour accumulation
  let max3h=0, max3hIdx=-1;
  for(let i=0;i<hours.length;i++){
    let s=0,cnt=0;
    for(let j=i;j<Math.min(i+3,hours.length);j++){ if(hours[j].mm!=null){s+=hours[j].mm; cnt++;} }
    if(cnt>0 && s>max3h){ max3h=s; max3hIdx=i; }
  }
  const base=100*(0.45*sIntensity(peak1h)+0.55*sAccum3h(max3h));
  const score=Math.min(100, Math.round(base*satMult(sm0,rain24)));
  return {score, tier:tierOf(score),
          peak1h:Math.round(peak1h*10)/10, peak1hAt:peak1hIdx>=0?hours[peak1hIdx].t:null,
          max3h:Math.round(max3h*10)/10, max3hAt:max3hIdx>=0?hours[max3hIdx].t:null,
          sm0, rain24};
}
function tierOf(score){
  if(score>=75) return "bahaya";
  if(score>=50) return "buruk";
  if(score>=25) return "waspada";
  return "safe";
}

const SEED_VERSION = 2;
const SEED_FLAG = NS+".seeded";
const SEED_VER_KEY = NS+".seedVersion";

(function seedFarms(){
  const seeded = localStorage.getItem(SEED_FLAG)==="1";
  const ver = parseInt(localStorage.getItem(SEED_VER_KEY)||"0",10);
  if(!seeded && locations.length===0){
    // First-ever run: seed the whole list.
    locations = SEED_FARMS.map(([name,lat,lng,region],i)=>({
      id:"L"+Date.now().toString(36)+i.toString(36), name, lat, lng, region
    }));
    localStorage.setItem(SEED_FLAG,"1");
    localStorage.setItem(SEED_VER_KEY,String(SEED_VERSION));
    saveLoc_();
  } else if(seeded && ver < SEED_VERSION){
    // Migration: add any (name+region) seed entry the user doesn't already have.
    // This back-fills farms added in a later SEED_VERSION (e.g. the full family
    // list) without touching the user's own added locations or deletions.
    const have = new Set(locations.map(l=>`${l.name}@@${l.region||""}`));
    SEED_FARMS.forEach(([name,lat,lng,region],i)=>{
      if(!have.has(`${name}@@${region}`)){
        locations.push({ id:"Lm"+Date.now().toString(36)+i.toString(36), name, lat, lng, region });
        have.add(`${name}@@${region}`);
      }
    });
    localStorage.setItem(SEED_VER_KEY,String(SEED_VERSION));
    saveLoc_();
  }
})();

         p:"It combines the three drivers of flash floods: <b>①peak 1-hour rain</b> (MetMalaysia issues thunderstorm warnings above 20mm/h); <b>②worst 3-hour accumulation</b> (Selangor JPS: ~60mm in 2–4h can trigger flash floods); and <b>③whether the soil is already saturated</b> — the same storm floods soaked ground but drains off dry ground. The third is an <b>amplifier</b>: wetter soil and more rain in the last 24h push the risk up."},
        {icon:"➕",bg:"#e0f2fe",fg:"#0369a1",h:"Add a location",
         p:"Tap <b>＋</b>, enter a name, then type coordinates or tap “Use my GPS location”. The app pre-loads many Malaysian orchards and cities (including low-lying Klang Valley areas)."},
        {icon:"🎓",bg:"#eff6ff",fg:"#1d4ed8",h:"Teacher &amp; Relief modes",
         p:"The <b>cap / life-ring icon</b> in the header switches between two views. <b>Teacher mode</b> (cap) is for a counsellor watching one district — your pinned places float to the top and each region shows a clear risk <b>word</b> (Safe / Waspada / Buruk / Bahaya). <b>Relief mode</b> (life-ring) is for teams overseeing everywhere — regions show a compact colour dot for fast scanning. Your choice is remembered."},
        {icon:"\u2b50",bg:"#fffbeb",fg:"#b45309",h:"Pin your district &amp; places",
         p:"Tap the <b>star</b> \u2606 on a region to mark <b>\u201cmy district\u201d</b>, or the star on a location card to mark <b>\u201cmy school / village\u201d</b>. Pinned districts jump to the top of the list, and pinned places rise to the top within their region \u2014 so the areas you are responsible for are always first."},
        {icon:"🌧️",bg:"#e0f2fe",fg:"#0369a1",h:"Get & refresh",
         p:"Tap <b>Get risk</b> on a card. Because it's a forecast, <b>refresh once each morning</b> for the latest model run. Data is saved, so the last result shows offline too."},
        {icon:"↻",bg:"#e0f2fe",fg:"#0369a1",h:"Update a whole region",
         p:"Expand a region and tap the <b>↻</b> on its heading to update every location in it, with progress on the button (e.g. 3/8). It's throttled so it never strains the server."},
        {icon:"🚗",bg:"#e0f2fe",fg:"#0369a1",h:"Update all (power-saving view)",

        {icon:"📊",bg:"#ecfdf5",fg:"#047857",h:"The numbers on a card",

          "வந்தவுடன் <b>PPS இல் JKM அதிகாரியிடம் பதிவு செய்யுங்கள்</b>. பதிவு என்பது <b>தகுதி பெறுவதற்கான</b> முதல் படி மட்டுமே — உதவியை உறுதி செய்யாது; தொகையும் நேரமும் (இருந்தால்) அதிகாரிகளால் தீர்மானிக்கப்படும்.",
          "<b>MyIBJKM</b> செயலியில் விவரங்களை நிரப்புங்கள் (PPS இல் உள்ள QR குறியீட்டைப் பயன்படுத்துங்கள்), உங்கள் தகவல் பதிவில் இருக்கும். உதவி கிடைக்குமா, எவ்வளவு, எப்போது என்பது ஒவ்வொரு வழக்கிலும் மாறுபடும், உறுதியில்லை.",
          "குழந்தைகளை எப்போதும் கண்காணியுங்கள். சுகாதாரம் பேணுங்கள்; சாப்பிடும் முன் சுத்தமான நீரில் கை கழுவுங்கள்.",
          "பின்னர் உரிமைகோர ரசீதுகளையும் வீட்டு சேத புகைப்படங்களையும் வைத்திருங்கள்."
        ]},
        {cls:"return",emoji:"↩️",title:"வீடு திரும்புதல் — பாதுகாப்பாக இருந்தால் மட்டும்",steps:[
          "<b>அதிகாரிகள் பாதுகாப்பானது என உறுதிசெய்த பின்பே திரும்புங்கள்.</b> நீர் வடிவது பகுதி பாதுகாப்பானது என்று அர்த்தமல்ல.",
          "மறைந்த ஆபத்துகளில் கவனம்: <b>மின் கேபிள், கசியும் எரிவாயு குழாய், வெடித்த தரை/சுவர்</b>. ஈரமாக இருந்தால் மின்சாரத்தை இயக்காதீர்கள் — மின்வல்லுநரை அழைக்கவும்.",
          "பாதுகாப்பானது என உறுதியாகும் வரை குழாய் நீரைக் குடிக்காதீர்கள். வெள்ள நீர் பட்ட உணவைத் தூக்கி எறியுங்கள்.",
          "சுத்தம் செய்வதற்கு முன் அனைத்து சேதங்களையும் புகைப்படம் எடுங்கள் — உதவி பதிவு மற்றும் காப்பீட்டிற்கு."
        ]},
        {cls:"rebuild",emoji:"🔧",title:"மீட்பு & மறுகட்டமைப்பு",steps:[
          "வீட்டை சுத்தம் செய்து கிருமிநீக்கம் செய்யுங்கள்; கையுறை, பூட்ஸ் அணியுங்கள். பூஞ்சை தடுக்க முழுமையாக உலர்த்துங்கள்.",
          "கடின வேலைக்கு சமூக/தன்னார்வலர் உதவி பெறுங்கள். அதிக ஆபத்துள்ள குடும்பங்களுக்கு முன்னுரிமை.",
          "MyIBJKM இல் உங்கள் நிலையைச் சரிபார்த்து, ஏதேனும் மறுகட்டமைப்பு உதவி இருக்கிறதா என மாவட்ட அலுவலகம்/JKM இடம் கேளுங்கள் — உதவி உறுதியில்லை, சூழ்நிலைக்கேற்ப மாறும்.",
          "<b>மனநலனில்</b> கவனம் செலுத்துங்கள் — பாதிக்கப்பட்டோர் (குறிப்பாக குழந்தைகள்) உணர்வுபூர்வ ஆதரவு தேவைப்படலாம். ஆசிரியர்-ஆலோசகர்கள் உதவலாம்."
        ]}
      ],

    guideTitle:"பயனர் வழிகாட்டி",
    guide:{
      intro:"FlashFlood ஒவ்வொரு இடத்தின் விரைவெள்ள ஆபத்தை, அடுத்த 48 மணி முன்னறிவிப்பு, தற்போதைய மண் ஈரம் மற்றும் கடந்த 24 மணி உண்மையான மழையைக் கொண்டு மதிப்பிடுகிறது. விவசாயிகளுக்கும் தாழ்ந்த நகரவாசிகளுக்கும் ஏற்றது. அனைத்து தரவும் Open-Meteo இலிருந்து.",
      qrTitle:"இந்த செயலியைப் பகிரு", qrSub:"நண்பரை ஸ்கேன் செய்து FlashFlood திறக்கச் செய்யவிடுங்கள்.",
      foot:"தரவு: Open-Meteo (மாதிரி கட்ட தரவு — பரந்த பகுதி குறிப்பு). இந்த செயலி ஒரு சோதனை மதிப்பீடு, அதிகாரப்பூர்வ எச்சரிக்கை அல்ல. எப்போதும் MetMalaysia மற்றும் உள்ளூர் அதிகாரிகளைப் பின்பற்றுங்கள். வெள்ளம் நிறைந்த சாலையில் எப்போதும் வாகனத்தை ஓட்ட வேண்டாம்.",
      tierTitle:"நான்கு ஆபத்து நிலைகள்",
      tiers:[
        {t:"safe",n:"பாதுகாப்பு",d:"அடுத்த 48ம லேசான மழை"},
        {t:"waspada",n:"Waspada",d:"அதிக மழை; தாழ் பகுதிகளைக் கவனி"},
        {t:"buruk",n:"Buruk",d:"கனமழை; விரைவெள்ள ஆபத்து"},
        {t:"bahaya",n:"Bahaya",d:"தீவிர மழை + நிறைந்த மண்"}
      ],
      sections:[
        {icon:"🌊",bg:"#e0f2fe",fg:"#0369a1",h:"இந்த செயலி என்ன செய்கிறது",
         p:"இது கடந்த காலத்தைப் பதிவு செய்வதற்குப் பதிலாக, அடுத்த 48 மணிக்கு விரைவெள்ள ஆபத்தை <b>முன்னறிவிக்கிறது</b>. ஒவ்வொரு இடமும் <b>0–100 ஆபத்து குறியீட்டை</b> மற்றும் நிலையை (பாதுகாப்பு / Waspada / Buruk / Bahaya) காட்டுகிறது, எப்போது அதிக மழை எதிர்பார்க்கப்படுகிறது என்பதையும்."},
        {icon:"🧮",bg:"#eef2ff",fg:"#4f46e5",h:"ஆபத்து எப்படிக் கணக்கிடப்படுகிறது",
         p:"இது விரைவெள்ளத்தின் மூன்று காரணிகளை இணைக்கிறது: <b>①உச்ச 1 மணி மழை</b> (MetMalaysia 20mm/மக்கு மேல் இடிமழை எச்சரிக்கை); <b>②மோசமான 3 மணி குவிப்பு</b> (செலாங்கூர் JPS: 2–4ம உள் 60mm விரைவெள்ளத்தைத் தூண்டலாம்); மற்றும் <b>③மண் ஏற்கனவே நிறைந்துள்ளதா</b> — அதே மழை நிறைந்த நிலத்தை வெள்ளமாக்கும், வறண்ட நிலத்திலிருந்து வழிந்தோடும். மூன்றாவது ஒரு <b>பெருக்கி</b>: ஈரமான மண் மற்றும் கடந்த 24ம அதிக மழை ஆபத்தை உயர்த்துகிறது."},
        {icon:"➕",bg:"#e0f2fe",fg:"#0369a1",h:"இடத்தைச் சேர்",
         p:"<b>＋</b> தட்டி, பெயரை உள்ளிடுக, பிறகு ஆயத்தொலைவுகளைத் தட்டச்சு செய்க அல்லது “என் GPS இடத்தை” தட்டுக. இந்த செயலி பல மலேசிய தோட்டங்களையும் நகரங்களையும் (தாழ்வான க்ளாங் பள்ளத்தாக்கு உட்பட) ஏற்றியுள்ளது."},
        {icon:"🎓",bg:"#eff6ff",fg:"#1d4ed8",h:"ஆசிரியர் & நிவாரண முறைகள்",
         p:"தலைப்பில் உள்ள <b>தொப்பி / உயிர்காக்கும் வளையம் ஐகான்</b> இரண்டு காட்சிகளுக்கு இடையே மாற்றுகிறது. <b>ஆசிரியர் முறை</b> (தொப்பி) ஒரு மாவட்டத்தைக் கவனிக்கும் ஆலோசகருக்கானது — நீங்கள் குறித்த இடங்கள் மேலே வரும், ஒவ்வொரு பகுதியும் தெளிவான ஆபத்து <b>வார்த்தையைக்</b> காட்டும் (Safe / Waspada / Buruk / Bahaya). <b>நிவாரண முறை</b> (வளையம்) எல்லா இடங்களையும் மேற்பார்வையிடும் குழுக்களுக்கானது — பகுதிகள் விரைவாகப் பார்க்க சிறிய நிற புள்ளியைக் காட்டும். உங்கள் தேர்வு நினைவில் வைக்கப்படும்."},
        {icon:"\u2b50",bg:"#fffbeb",fg:"#b45309",h:"உங்கள் மாவட்டம் & இடங்களைக் குறியிடு",
         p:"ஒரு பகுதியில் <b>நட்சத்திரம்</b> \u2606 தட்டி <b>“என் மாவட்டம்”</b> எனக் குறியிடுங்கள், அல்லது இட கார்டில் உள்ள நட்சத்திரத்தை தட்டி <b>“என் பள்ளி / கிராமம்”</b> எனக் குறியிடுங்கள். குறித்த மாவட்டங்கள் பட்டியலின் மேலே வரும், குறித்த இடங்கள் அவற்றின் பகுதிக்குள் மேலே வரும் — நீங்கள் பொறுப்பான பகுதிகள் எப்போதும் முதலில் இருக்கும்."},
        {icon:"🌧️",bg:"#e0f2fe",fg:"#0369a1",h:"பெறுதல் & புதுப்பித்தல்",
         p:"கார்டில் <b>ஆபத்தைப் பார்</b> தட்டுக. இது முன்னறிவிப்பாதலால், <b>ஒவ்வொரு காலையிலும் ஒரு முறை புதுப்பிக்கவும்</b>. தரவு சேமிக்கப்படும், எனவே ஆஃப்லைனில் கடைசி மதிப்பும் காணப்படும்."},
        {icon:"↻",bg:"#e0f2fe",fg:"#0369a1",h:"முழு பகுதியையும் புதுப்பி",
         p:"ஒரு பகுதியைத் திறந்து தலைப்பில் <b>↻</b> தட்டினால் அதிலுள்ள ஒவ்வொரு இடத்தையும் புதுப்பிக்கிறது, பொத்தானில் முன்னேற்றம் (எ.கா. 3/8) காட்டப்படுகிறது. சர்வரை மிகையாக்காமல் இது கட்டுப்படுத்தப்படுகிறது."},
        {icon:"🚗",bg:"#e0f2fe",fg:"#0369a1",h:"அனைத்தையும் புதுப்பி (மின்சார சேமிப்பு)",
         p:"<b>கார்</b> ஐகானைத் தட்டி ஒவ்வொரு இடத்தையும் ஒவ்வொன்றாகப் புதுப்பிக்கவும். திரை ஒரு <b>முழு கருப்பு மின்சார சேமிப்பு</b> ஆகி பெரிய முன்னேற்றத்தைக் காட்டுகிறது. ஏற்கனவே புதியவை தவிர்க்கப்படுகின்றன. நிறுத்த மீண்டும் தட்டுக. திரை உறங்கலாம்; செயலியைத் திறந்தே வைத்திருக்கவும்."},
        {icon:"📊",bg:"#ecfdf5",fg:"#047857",h:"கார்டில் உள்ள எண்கள்",
         p:"மேல் பகுதி ஆபத்து குறியீடு மற்றும் நிலையைக் காட்டுகிறது. கீழே நான்கு கட்டங்கள்: <b>உச்ச மழை, மோசமான 3 மணி குவிப்பு, மண் ஈரம், மற்றும் கடந்த 24ம உண்மை மழை</b>. அதற்குக் கீழே, அடுத்த 48ம மணிநேர மழை பட்டைகள் — வெளிர் கடந்தகாலம், கறுப்பு எதிர்காலம்."},
        {icon:"📤",bg:"#ecfdf5",fg:"#047857",h:"ஏற்றுதல் & பகிர்தல்",
         p:"<b>Excel ஏற்று</b> மணிநேர முன்னறிவிப்பையும் ஆபத்து சுருக்கத்தையும் சேமிக்கிறது. <b>பகிர்</b> முழு கார்டையும் WhatsApp போன்றவற்றிற்காக படமாகப் பிடிக்கிறது. பட்டியல் மேலுள்ள <b>அனைத்தையும் Excel ஏற்று</b> ஏற்றப்பட்ட எல்லா இடங்களையும் இணைக்கிறது."},
        {icon:"⚠️",bg:"#fef2f2",fg:"#b91c1c",h:"முக்கியம்",

function esc(s){return(s+"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}
/* Location display name by language. Stored names are "English 中文".
   - zh / en: show the full stored name (English + Chinese combo), useful to all races.
   - ms / ta: strip the Chinese, show the English portion only (English is the common
     name across communities). Dangling separators left by the removed Chinese are
     cleaned up. */
function englishPart(name){
  let s=(name+"").replace(/[\u3000-\u303f\u3400-\u4dbf\u4e00-\u9fff\uf900-\ufaff\uff00-\uffef]/g," ");
  s=s.replace(/\s{2,}/g," ").trim();
  s=s.replace(/([A-Za-z0-9])-\s+/g,"$1 ");        // 'Pitt- ' -> 'Pitt '
  s=s.replace(/[\s\-–—\/]+$/,"").trim();           // trailing separators
  s=s.replace(/\s{2,}/g," ").trim();
  return s;
}
function dispName(nameOrLoc){
  const name = (nameOrLoc && typeof nameOrLoc==="object") ? nameOrLoc.name : nameOrLoc;
  if(lang==="ms"||lang==="ta"){ const e=englishPart(name); return e||name; }
  return name;
}
function fmtHour(iso){ // "2026-07-05T14:00" -> "Sat 2pm" style short
  if(!iso) return "";
  const d=new Date(iso);
  const wk=tr("week")[d.getDay()];
  let h=d.getHours();
  const ap=h<12?(lang==="zh"?"上午":"am"):(lang==="zh"?"下午":"pm");
  let hh=h%12; if(hh===0) hh=12;
  return lang==="zh"?`${wk} ${ap}${hh}点`:`${wk} ${hh}${ap}`;
}
function hoursUntil(iso){
  if(!iso) return null;
  return Math.round((new Date(iso).getTime()-Date.now())/3600000);
}
function riskHeroHTML(c){
  const r=c.risk;
  if(!r) return "";
  const tier=r.tier;
  const emoji=TIER_EMOJI[tier];
  const tierLabel=tr("tierName")[tier];
  // when does the worst 3h window start?
  let windowTxt;
  if(r.score<25 && r.peak1h<2){ windowTxt=tr("noRain"); }
  else {
    const h=hoursUntil(r.max3hAt!=null?r.max3hAt:r.peak1hAt);
    windowTxt = (h==null)? "" : (h<=1? tr("windowNow") : tr("windowIn")(h));
    if(r.max3hAt){ const at=fmtHour(r.max3hAt); if(at) windowTxt+= ` · ${at}`; }
  }
  const advice=tr("advice")[tier];
  return `<div class="risk-hero ${tier}">
    <div class="risk-top">
      <div class="risk-badge">${emoji}</div>
      <div class="risk-tier-wrap">
        <div class="risk-tier">${tierLabel}</div>
        <div class="risk-window">${windowTxt}</div>

    </div>
    <div class="risk-advice">${advice}</div>
  </div>`;
}
function metricTilesHTML(c){

  const sm=r.sm0;
  let satTxt=tr("satMid"), wet=false;
  if(sm!=null){ if(sm>=0.38){satTxt=tr("satWet"); wet=true;} else if(sm<0.22){satTxt=tr("satDry");} }
  const smPct = sm!=null? Math.round(sm*100)+"%" : "—";
  return `<div class="metric-row">
    <div class="metric"><div class="ml">${tr("peakLabel")}</div><div class="mn tabular">${r.peak1h.toFixed(1)}<span class="mu">${tr("mmh")}</span></div></div>

  </div>`;
}
/* 48h hourly rainfall strip. `series` = full hourly array incl. past 24h (marked). */
function forecastStripHTML(c){
  const arr=c.series;
  if(!arr||!arr.length) return "";
  const max=Math.max(...arr.map(h=>h.mm==null?0:h.mm),1);
  const bars=arr.map(h=>{
    const v=h.mm==null?0:h.mm;
    const ht=Math.max(2,Math.round((v/max)*100));
    const col = v<=0.1? "#e2e8f0" : (v>=20? "#dc2626" : v>=10? "#ea580c" : v>=4? "#f59e0b" : "#38bdf8");
    return `<div class="fc-col"><div class="fc-bar ${h.past?"past":""}" style="height:${ht}%;background:${col}"></div></div>`;
  }).join("");
  const firstFuture=arr.find(h=>!h.past);
  const nowLabel=firstFuture?tr("fcNow"):"";
  const startTxt=fmtHour(arr[0].t), endTxt=fmtHour(arr[arr.length-1].t);
  return `<div class="fc-wrap">
    <div class="fc-cap"><span>${tr("fcTitle")}</span><span class="fx">${tr("fcPeak")(max.toFixed(1))}</span></div>
    <div class="fc-bars">${bars}</div>
    <div class="fc-axis"><span>${tr("fcPast")}</span><span>${endTxt}</span></div>
  </div>`;
}

/* worst tier within a region (for the accordion header dot) */
function regionWorstTier(locs){
  let worst=-1;
  const order={safe:0,waspada:1,buruk:2,bahaya:3};
  for(const l of locs){ const c=cache[l.id]; if(c&&c.risk){ const o=order[c.risk.tier]; if(o>worst) worst=o; } }
  if(worst<0) return null;
  return ["safe","waspada","buruk","bahaya"][worst];
}
function render(){
  const list=document.getElementById("locList");
  const filterEl=document.getElementById("locFilter");
  if(!locations.length){
    if(filterEl) filterEl.style.display="none";
    list.innerHTML=`<div class="empty"><div class="big">🌊</div><div class="t">${tr("emptyT")}</div><div class="d">${tr("emptyD")}</div></div>`;
    return;
  }
  const exportBtn=document.getElementById("exportAllBtn");
  if(exportBtn){
    const anyLoaded=locations.some(l=>cache[l.id]&&cache[l.id].risk);
    exportBtn.style.display=anyLoaded?"flex":"none";
  }
  const many=locations.length>12;
  if(filterEl){ filterEl.style.display=many?"block":"none"; filterEl.placeholder=tr("filterPlaceholder"); }
  const q=(many&&filterEl?filterEl.value:"").trim().toLowerCase();
  const filtering=q.length>0;
  const live=filtering?locations.filter(l=>l.name.toLowerCase().includes(q)):locations;
  if(filtering&&!live.length){ list.innerHTML=`<div class="empty" style="padding:24px"><div class="d">${tr("noMatch")}</div></div>`; return; }
  if(!many){ list.innerHTML=live.map(cardHTML).join(""); return; }
  const groups=new Map();
  for(const loc of live){ const g=loc.region||tr("ungrouped"); if(!groups.has(g)) groups.set(g,[]); groups.get(g).push(loc); }
  // Ordering:
  //  teacher mode → pinned "my districts" first, then priority regions, then the rest.
  //  relief mode  → original behaviour (priority regions first, then the rest).
  // Within any region, pinned locations are floated to the top of that region too.
  const isPinnedR=r=>pinnedRegions.has(r);
  const allRegions=[...groups.keys()];
  let orderRegions;
  if(appMode==="teacher"){
    const pinned=allRegions.filter(isPinnedR);
    const prio=allRegions.filter(r=>!isPinnedR(r)&&PRIORITY_REGIONS.includes(r));
    const rest=allRegions.filter(r=>!isPinnedR(r)&&!PRIORITY_REGIONS.includes(r));
    orderRegions=[...pinned,...prio,...rest];
  }else{
    const prio=allRegions.filter(r=>PRIORITY_REGIONS.includes(r));
    const rest=allRegions.filter(r=>!PRIORITY_REGIONS.includes(r));
    orderRegions=[...prio,...rest];
  }
  const orderedGroups=orderRegions.map(r=>{
    let locs=groups.get(r);
    // float pinned locations to the top of their region
    const pinnedFirst=locs.filter(l=>pinnedLocs.has(l.id));
    const others=locs.filter(l=>!pinnedLocs.has(l.id));
    return [r,[...pinnedFirst,...others]];
  });
  if(expandedGroups===null) expandedGroups=new Set();
  let html="";
  for(const [region,locs] of orderedGroups){
    const open=filtering||expandedGroups.has(region);
    const rid=region.replace(/'/g,"\\'");
    const worst=regionWorstTier(locs);
    const pinnedR=pinnedRegions.has(region);
    // Status shown next to the region name:
    //  teacher mode → a clear risk WORD badge (Safe/Waspada/Buruk/Bahaya), colour-backed
    //                 but readable without relying on colour. Blank if no data yet.
    //  relief mode  → the compact colour dot (fast scan across many districts).
    let statusEl="";
    if(worst){
      if(appMode==="teacher"){
        const label=tr("tierName")[worst];
        statusEl=`<span class="lg-badge lg-${worst}">${label}</span>`;
      }else{
        statusEl=`<span class="lg-worst" style="background:${TIER_COLOR[worst]}"></span>`;
      }
    }
    const pinBtn=`<button class="lg-pin${pinnedR?' on':''}" onclick="event.stopPropagation(); toggleRegionPin('${rid}')" title="${tr("pinRegion")}" aria-label="${tr("pinRegion")}">${pinnedR?"★":"☆"}</button>`;
    html+=`<div class="loc-group-h${open?' open':''}${pinnedR?' pinned':''}" onclick="toggleGroup('${rid}')">
        <span class="lg-caret">${open?'▾':'▸'}</span>
        <span class="lg-name">${esc(dispName(region))}</span>
        ${statusEl}
        ${pinBtn}
        ${open?`<button class="lg-refresh" onclick="event.stopPropagation(); refreshRegion('${rid}')" title="${tr('updateRegion')}">↻</button>`:''}
        <span class="lg-count">${locs.length}</span>
      </div>`;
    if(open) html+=`<div class="loc-group-body">${locs.map(cardHTML).join("")}</div>`;
  }
  list.innerHTML=html;
}
function toggleGroup(region){
  if(expandedGroups===null) expandedGroups=new Set();
  if(expandedGroups.has(region)) expandedGroups.delete(region); else expandedGroups.add(region);
  render();
}

/* ===== soft delete / recycle bin ===== */
function softDelete(id){
  const i=locations.findIndex(l=>l.id===id); if(i<0) return;
  if(swipeCurrentId) closeCardActions(swipeCurrentId);
  const loc=locations[i];
  bin.unshift({...loc, deletedAt:Date.now()});
  locations.splice(i,1);
  saveLoc_(); saveBin(); render(); updateBinCount();
}
function restoreLoc(id){
  const i=bin.findIndex(l=>l.id===id); if(i<0) return;
  const {deletedAt, ...loc}=bin[i];
  if(locations.some(l=>l.id===loc.id)) loc.id="L"+Date.now();
  locations.push(loc);
  bin.splice(i,1);
  saveLoc_(); saveBin(); render(); renderBin(); updateBinCount();
}
function purgeLoc(id){
  const loc=bin.find(l=>l.id===id); if(!loc) return;
  if(confirm(tr("confirmPurge")(loc.name))){
    bin=bin.filter(l=>l.id!==id);

}

/* ===== fetch helpers (retry, pooled) ===== */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
let RATE_LIMIT_HITS=0, RATE_LIMIT_UNTIL=0;
async function fetchJSON(url,{tries=4}={}){
  let wait=600;
  for(let attempt=0;attempt<tries;attempt++){
    let res;
    try{ res=await fetch(url); }
    catch(e){ if(attempt===tries-1) throw e; await sleep(wait+Math.random()*300); wait=Math.min(wait*2,8000); continue; }
    if(res.ok) return res.json();
    if(res.status===429||res.status===503){
      RATE_LIMIT_HITS++; RATE_LIMIT_UNTIL=Date.now()+15000;
      if(attempt===tries-1) return null;
      const ra=parseInt(res.headers.get("Retry-After")||"",10);
      const delay=(!isNaN(ra)?ra*1000:wait)+Math.random()*300;
      await sleep(delay); wait=Math.min(wait*2,8000); continue;
    }
    return null;
  }
  return null;
}
async function runPooled(items,worker,max=2){
  const queue=items.slice(); const running=[];
  async function next(){
    if(!queue.length) return;
    const item=queue.shift();
    const p=Promise.resolve(worker(item)).finally(()=>{ running.splice(running.indexOf(p),1); });
    running.push(p);
    if(running.length>=max) await Promise.race(running);
    return next();
  }
  await next(); await Promise.all(running);
}
function ymd(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; }

/* ===== core: fetch forecast + compute flash-flood risk ===== */
async function getRisk(id,opts={}){
  const loc=locations.find(l=>l.id===id); if(!loc) return false;
  const btn=document.getElementById("ld-"+id);
  const st=document.getElementById("st-"+id);
  if(btn){ btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${tr("loading")}`; }
  if(st){ st.style.color="#94a3b8"; st.textContent=""; }
  try{
    // One forecast call: hourly rain/prob/cape/soil-moisture, plus past_days=1 for
    // the last-24h actual rain that tells us how saturated the ground already is.
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}`
      +`&hourly=precipitation,precipitation_probability,cape,soil_moisture_0_1cm,soil_moisture_3_9cm`
      +`&past_days=1&forecast_days=3&timezone=auto`;
    const j=await fetchJSON(url);
    if(!j||!j.hourly||!j.hourly.time){
      if(cache[id]&&cache[id].risk){ // keep showing prior result on failure
        if(btn){ btn.disabled=false; btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><polyline points="21 3 21 9 15 9"/></svg> ${tr("reget")}`; }
        if(st){ st.style.color="#ef4444"; st.textContent=tr("errFetch"); }
        return false;
      }
      throw new Error("no data");
    }
    const H=j.hourly;
    const times=H.time;
    const nowMs=Date.now();
    // Build a full series: past 24h (marked past) + next 48h. Find "now" index.
    const nowIdx = times.findIndex(t=>new Date(t).getTime()>=nowMs);
    const startIdx = Math.max(0, (nowIdx<0?times.length:nowIdx) - 24);   // ~24h of past
    const endIdx = Math.min(times.length, (nowIdx<0?times.length:nowIdx) + 48); // next 48h
    const series=[];
    for(let i=startIdx;i<endIdx;i++){
      series.push({
        t:times[i],
        mm:H.precipitation?.[i]??null,
        prob:H.precipitation_probability?.[i]??null,
        cape:H.cape?.[i]??null,
        past:(nowIdx>=0 && i<nowIdx)
      });
    }
    // Future-only slice for the risk score
    const future=series.filter(h=>!h.past);
    // last-24h actual rain (antecedent) = sum over the past slice
    let rain24=0; for(const h of series){ if(h.past && h.mm!=null) rain24+=h.mm; }
    rain24=Math.round(rain24*10)/10;
    // current soil moisture: reading nearest to "now" (top layer 0-1cm)
    let sm0=null;
    const smIdx = nowIdx>=0? nowIdx : times.length-1;
    for(let k=smIdx;k>=0;k--){ const v=H.soil_moisture_0_1cm?.[k]; if(v!=null){ sm0=v; break; } }

    const risk=computeRisk(future, sm0, rain24);
    cache[id]={risk, series, fetched:Date.now(), stale:false};
    saveCache();
    if(!opts.quiet) render();
    return true;
  }catch(e){
    if(btn){ btn.disabled=false; btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><polyline points="21 3 21 9 15 9"/></svg> ${cache[id]?tr("reget"):tr("get")}`; }
    if(st){ st.style.color="#ef4444"; st.textContent=tr("errFetch"); }
    return false;
  }
}

/* ===== region bulk refresh ===== */
let _refreshing=false;
async function refreshRegion(region){
  if(_refreshing) return;
  const farms=locations.filter(l=>(l.region||tr("ungrouped"))===region);
  if(!farms.length) return;
  _refreshing=true;
  let done=0, failed=0;
  const headBtn=[...document.querySelectorAll(".lg-refresh")].find(b=>b.getAttribute("onclick")?.includes(`refreshRegion('${region.replace(/'/g,"\\'")}')`));
  const setProg=()=>{ if(headBtn) headBtn.textContent=`${done}/${farms.length}`; };
  setProg();
  await runPooled(farms, async(loc)=>{ const ok=await getRisk(loc.id,{quiet:true}); done++; if(!ok) failed++; setProg(); }, 2);
  _refreshing=false; render();
  toast(failed? tr("regionDonePartial")(done-failed,farms.length) : tr("regionDone")(farms.length));
}

/* ===== drive mode: update all, one by one ===== */
const DRIVE_GAP_MS=2000, DRIVE_GAP_MAX=12000;
let driveRunning=false, driveAbort=false;
function driveSleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function isFreshWithin(ts,mins){ if(!ts) return false; return (Date.now()-ts) < mins*60000; }
async function fetchAllSlowly(){
  if(driveRunning){ driveAbort=true; return; }
  const btn=document.getElementById("driveBtn");
  if(!locations.length){ toast(tr("driveNone")); return; }
  driveRunning=true; driveAbort=false;
  if(btn) btn.classList.add("driving");
  document.body.classList.add("drive-dark");
  let wake=null; try{ if(navigator.wakeLock) wake=await navigator.wakeLock.request("screen"); }catch(_){}
  let done=0, failed=0, skipped=0;
  RATE_LIMIT_HITS=0; RATE_LIMIT_UNTIL=0;
  const doCount=document.getElementById("doCount");
  const doLabel=document.getElementById("doLabel");
  const doName=document.getElementById("doName");
  if(doLabel) doLabel.textContent=tr("driveProg");
  const setBadge=(name)=>{
    const txt=`${done+skipped}/${locations.length}`;
    if(btn) btn.setAttribute("data-prog",txt);
    if(doCount) doCount.textContent=txt;
    if(doName&&name!=null) doName.textContent=name;
  };
  setBadge(""); toast(tr("driveStart")(locations.length));
  for(const loc of orderedLocations()){
    if(driveAbort) break;
    const c=cache[loc.id];
    if(c&&c.risk&&isFreshWithin(c.fetched,30)){ skipped++; setBadge(); continue; } // fresh <30min: skip
    if(doName) doName.textContent=dispName(loc);
    const ok=await getRisk(loc.id,{quiet:true});
    if(ok) done++; else failed++;
    setBadge();
    if(driveAbort) break;
    let gap=Math.min(DRIVE_GAP_MAX, DRIVE_GAP_MS*(1+RATE_LIMIT_HITS));
    const cd=RATE_LIMIT_UNTIL-Date.now(); if(cd>0) gap=Math.max(gap,cd);
    await driveSleep(gap);
  }
  driveRunning=false;
  try{ if(wake) await wake.release(); }catch(_){}
  document.body.classList.remove("drive-dark");
  if(btn){ btn.classList.remove("driving"); btn.removeAttribute("data-prog"); }
  render();
  if(driveAbort) toast(tr("driveStopped")(done, locations.length));
  else if(failed) toast(tr("driveDonePartial")(locations.length-failed, locations.length));
  else toast(tr("driveDone")(locations.length, skipped));
}

/* ===== share ===== */
/* ===== share with preview =====
   Tapping Share opens a preview dialog: the auto-generated alert text sits in an
   editable box so a teacher can add their own note (e.g. a school notice) before
   sending, and a thumbnail of the card image is shown. confirmShare() then does the
   actual native share (image + edited text) or the WhatsApp text fallback. */
let _shareState=null;   // {id, blob, file, url}
async function shareLoc(id){
  const loc=locations.find(l=>l.id===id); if(!loc) return;
  if(swipeCurrentId) closeCardActions(swipeCurrentId);
  const c=cache[id];
  const card=document.getElementById("content-"+id);
  const textMsg=()=>{
    let m=`${tr("shAlert")}\n📍 ${dispName(loc)}`;
    if(c&&c.risk){
      const r=c.risk;
      const tierLabel=tr("tierName")[r.tier];
      m+=`\n${tr("shTitle")(TIER_EMOJI[r.tier]+" "+tierLabel)}`;
      m+=`\n${tr("shScore")}: ${r.score}/100`;
      if(r.peak1h>=2){
        m+=`\n${tr("shPeak")}: ${r.peak1h.toFixed(1)} ${tr("mmh")}`;
        m+=`\n${tr("shAccum")}: ${r.max3h.toFixed(0)} ${tr("mm")}`;
        const h=hoursUntil(r.max3hAt!=null?r.max3hAt:r.peak1hAt);
        if(h!=null){ m+=`\n${tr("shWindow")}: ${h<=1?tr("windowNow"):tr("windowIn")(h)}`; }
      }else{
        m+=`\n${tr("noRain")}`;
      }
      m+=`\n\n${tr("advice")[r.tier]}`;
    }
    m+=`\n\n${tr("attrib")}`;
    return m;
  };

  // Prepare the editable preview text. Leave a blank line at the very top with a
  // gentle placeholder so the teacher's cursor lands where they'd add their note.
  const baseText=textMsg();
  _shareState={id, blob:null, file:null, url:null};

  // Try to render the card image up-front so it can be previewed AND shared.
  let imgReady=false;
  if(c&&c.risk&&typeof html2canvas!=="undefined"){
    const grip=card.querySelector(".grip");
    const btnRow=card.querySelector(".btn-row");
    const statusEl=card.querySelector(".card-status");
    if(grip) grip.style.visibility="hidden";
    if(btnRow) btnRow.style.display="none";
    if(statusEl) statusEl.style.display="none";
    try{
      const canvas=await html2canvas(card,{backgroundColor:"#ffffff",scale:2,useCORS:true,logging:false});
      const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
      if(blob){
        const safe=loc.name.replace(/[\\\/:*?"<>|]/g,"_");
        const file=new File([blob],`${safe}_flashflood.png`,{type:"image/png"});
        const url=URL.createObjectURL(blob);
        _shareState.blob=blob; _shareState.file=file; _shareState.url=url;
        imgReady=true;
      }
    }catch(_){}
    if(grip) grip.style.visibility="";
    if(btnRow) btnRow.style.display="";
    if(statusEl) statusEl.style.display="";
  }

  // Fill and open the preview dialog
  const ta=document.getElementById("shareText");
  ta.value=baseText;
  const thumb=document.getElementById("sharePreviewThumb");
  const thumbImg=document.getElementById("sharePreviewImg");
  if(imgReady && _shareState.url){ thumbImg.src=_shareState.url; thumb.style.display="block"; }
  else { thumb.style.display="none"; }
  document.getElementById("shareOverlay").classList.add("on");
  // place the cursor at the very start so a teacher can immediately type a note above
  setTimeout(()=>{ ta.focus(); ta.setSelectionRange(0,0); ta.scrollTop=0; },50);
}

function closeSharePreview(){
  document.getElementById("shareOverlay").classList.remove("on");
  if(_shareState&&_shareState.url){ try{URL.revokeObjectURL(_shareState.url);}catch(_){}}
  _shareState=null;
}

/* Send the (possibly edited) alert. Prefers the native share sheet with the image
   attached + text as caption; falls back to WhatsApp text, or downloads the image. */
async function confirmShare(){
  if(!_shareState) return;
  const text=document.getElementById("shareText").value;
  const {file,blob,url}=_shareState;
  document.getElementById("shareOverlay").classList.remove("on");
  try{
    if(file && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], text});
    }else if(blob){
      // No file-share support: download the image, then open WhatsApp with the text
      const a=document.createElement("a"); a.href=url; a.download=file.name;
      document.body.appendChild(a); a.click(); a.remove();
      window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
    }else{
      window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
    }
  }catch(e){
    if(!(e&&e.name==="AbortError")){
      window.open("https://wa.me/?text="+encodeURIComponent(text),"_blank");
    }
  }finally{
    if(url){ try{URL.revokeObjectURL(url);}catch(_){}}
    _shareState=null;
  }
}

/* ===== export all loaded locations (risk summary + tidy hourly) ===== */
function exportAllXLS(){

      loc.name, loc.region||"",

  sws["!autofilter"]={ref:`A1:J${sRows.length}`};
  XLSX.utils.book_append_sheet(wb,sws,tr("summarySheet"));

  const rows=[header];
  for(const loc of loaded){

      rows.push([loc.name, loc.region||"", h.t.replace("T"," "),

  XLSX.utils.book_append_sheet(wb,ws,tr("dataSheet"));
  const stamp=ymd(new Date());
  XLSX.writeFile(wb,`flashflood-all-${stamp}.xlsx`);

}

/* ===== swipe-reveal + right-click actions ===== */
let swipeCurrentId=null, swipeStartX=0, swipeStartY=0, swipeDir=null, isSwiping=false;
function openCardActions(id){ const wrap=document.getElementById("content-"+id)?.closest(".card-wrap"); if(!wrap) return; wrap.classList.add("actions-open"); swipeCurrentId=id; }
function closeCardActions(id){ const wrap=document.getElementById("content-"+id)?.closest(".card-wrap"); if(wrap) wrap.classList.remove("actions-open"); if(swipeCurrentId===id) swipeCurrentId=null; }
function handleTouchStart(e,id){ if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId); swipeStartX=e.touches[0].clientX; swipeStartY=e.touches[0].clientY; isSwiping=false; swipeDir=null; }
function handleTouchMove(e,id){
  const dx=e.touches[0].clientX-swipeStartX, dy=e.touches[0].clientY-swipeStartY;
  if(!swipeDir){ if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10){ swipeDir="h"; } else if(Math.abs(dy)>10){ swipeDir="v"; } }
  if(swipeDir==="h"){ isSwiping=true; if(e.cancelable) e.preventDefault(); }
}
function handleTouchEnd(e,id){
  if(swipeDir==="v"){ return; }
  if(swipeDir!=="h"){
    if(swipeCurrentId===id && !e.target.closest(".swipe-actions")){ closeCardActions(id); if(e.cancelable) e.preventDefault(); }
    return;
  }
  const dx=e.changedTouches[0].clientX-swipeStartX;
  if(dx<-40) openCardActions(id); else if(dx>40) closeCardActions(id);
  setTimeout(()=>isSwiping=false,50);
}
function handleContextMenu(e,id){ e.preventDefault(); if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId); if(swipeCurrentId===id) closeCardActions(id); else openCardActions(id); }
function toggleCardActions(id){ if(swipeCurrentId&&swipeCurrentId!==id) closeCardActions(swipeCurrentId); if(swipeCurrentId===id) closeCardActions(id); else openCardActions(id); }
document.addEventListener("click",e=>{
  if(!swipeCurrentId) return;
  const wrap=e.target.closest(".card-wrap");
  if(!wrap){ closeCardActions(swipeCurrentId); return; }
  if(wrap.id==="wrap-"+swipeCurrentId && !e.target.closest(".swipe-actions") && !e.target.closest(".grip")){ closeCardActions(swipeCurrentId); }
});

/* ===== auto-refresh stale (forecast older than ~3h) on launch/foreground ===== */
function isStaleFetch(ts){ if(!ts) return true; return (Date.now()-ts) > 3*3600000; }
let autoRefreshing=false;
async function autoRefreshStale(){
  if(autoRefreshing) return;
  if(navigator.onLine===false) return;
  const queue=locations.filter(l=>{ const c=cache[l.id]; return c&&c.risk&&isStaleFetch(c.fetched); });
  if(!queue.length) return;
  autoRefreshing=true;
  try{ for(const loc of queue){ try{ await getRisk(loc.id); }catch(_){} await new Promise(r=>setTimeout(r,1400)); } }
  finally{ autoRefreshing=false; }
}

/* ===== boot ===== */
Object.keys(cache).forEach(k=>{if(cache[k]) cache[k].stale=true});
applyLang();
window.addEventListener("load",()=>{
  setTimeout(()=>{ const b=document.getElementById("boot-screen"); if(b){b.style.opacity="0"; setTimeout(()=>b.remove(),420)} },650);
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
  setTimeout(autoRefreshStale, 900);
});
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") autoRefreshStale(); });
</script>
